name: Deploy GitHub Pages

# Manual trigger commit for Pages deployment.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build production site
        run: npm run build

      - name: Patch dist data version
        run: node scripts/patch-dist-version.mjs

      - name: Verify deployable HTML
        run: npm run check:deploy-html

      - name: Run smoke test
        run: npm test

      - name: Run browser smoke test
        run: npm run test:browser

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Cancel stale Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: 'github-pages',
                per_page: 10
              });
              for (const d of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: d.id,
                  per_page: 1
                });
                const state = statuses[0]?.state;
                if (!state || ['pending', 'queued', 'in_progress'].includes(state)) {
                  console.log(`Setting deployment ${d.id} (${d.sha.slice(0,7)}) to inactive`);
                  await github.rest.repos.createDeploymentStatus({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    deployment_id: d.id,
                    state: 'inactive',
                  });
                }
              }
            } catch (e) {
              console.log('Could not clear stale deployments:', e.message);
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
