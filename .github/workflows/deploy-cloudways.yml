name: Deploy Cloudways Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Patch dist data version
        run: node scripts/patch-dist-version.mjs

      - name: Push production files to cloudways branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          rm -rf assets
          cp dist/index.html index.html
          cp -r dist/assets assets
          git add -f index.html assets/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Build: production assets"
          git push -f origin HEAD:refs/heads/cloudways
