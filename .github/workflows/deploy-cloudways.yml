name: Deploy Cloudways Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Patch dist data version
        run: node scripts/patch-dist-version.mjs

      - name: Push dist/ contents to cloudways branch
        run: |
          cd dist
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "Deploy: build from $(cd .. && git rev-parse --short HEAD)"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dmo18/MySugya.git HEAD:cloudways
