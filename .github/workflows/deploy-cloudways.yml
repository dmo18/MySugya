name: Deploy Cloudways Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if this is a build-bot commit to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Patch dist data version
        run: node scripts/patch-dist-version.mjs

      - name: Commit production files to main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp dist/index.html index.html
          cp -r dist/assets assets
          git add index.html assets/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Build: production assets [skip ci]"
          git push origin main
