<!DOCTYPE html>
<html lang="en" data-mode="mist" data-accent="gold">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5"/>
  <meta name="color-scheme" content="light dark"/>
  <title>My Sugya</title>
  <meta name="description" content="Understand the sugya. A Talmud study companion."/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="styles.css"/>
  <script>(function(){
    var t=null;try{t=JSON.parse(localStorage.getItem('mysugya:tweaks'));}catch(e){}
    if(!t){try{t=JSON.parse(localStorage.getItem('yoma:tweaks'));}catch(e){}}
    var m=(t&&t.mode)||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'mist');
    document.documentElement.setAttribute('data-mode',m);
    var meta=document.querySelector('meta[name="color-scheme"]');
    if(meta)meta.content=({light:1,mist:1,sepia:1}[m])?'light':'dark';
  })();</script>
</head>
<body>
  <div id="root"><p style="padding:2rem;font-family:sans-serif;color:#888">Loading...</p></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="manifest.js?v=11.2"></script>
  <script type="text/babel" src="tweaks-panel.jsx?v=11.2"></script>
  <script type="text/babel" src="app.jsx?v=11.2"></script>
</body>
</html>
